# АНИМАЦИИ

animations {
    animation = fadeIn, 0, 0, linear
}

# ФОН
background {
    color = rgb(0, 0, 0)
    monitor =
}

# ГЕНЕРАЛ
general {
    hide_cursor = true
    fail_timeout = 10000
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    immediate_render = true
}

# ВВОД ПАРОЛЯ
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.4 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.4 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    inner_color = rgb(10, 10, 10)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = PixelLocale v.1.4 Regular
    placeholder_text = <i><span foreground="##c8c8c8" rise="20000">Введите пароль</span></i>
    fail_text = <span foreground="##ff0303" >kill yourself</span>
    check_color = rgb(255, 0, 0)
    fail_color = rgb(255, 0, 0)
    hide_input = false
    position = 0, -225
    halign = center
    valign = center
    dots_text_format = ✱
    rounding = 0
    outline_thickness = 2
    outer_color = rgb(200, 200, 200)
}

# Время
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 130
    font_family = PixelLocale v.1.4 Regular
    position = 0, 240
    halign = center
    valign = center
}

# Дата
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 30
    font_family = PixelLocale v.1.4 Regular
    position = 0, 105
    halign = center
    valign = center
}

# Приветствие

label {
    monitor =
    text = Добро пожаловать!
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    font_family = PixelLocale v.1.4 Regular
    position = 0, -130
    halign = center
    valign = center
}

label {
    monitor =
    text = kill yourself
    color = rgb(10, 0, 0)
    font_size = 60
    font_family = PixelLocale v.1.4 Regular
    position = 0, 0
    halign = center
    valign = center
}
